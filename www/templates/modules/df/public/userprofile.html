<html>

    <body>

        <div class="row ">
            <div class="col-10  col-md-4 col-xl-3">

                <h4>Мій профіль</h4>
                <form   zippy="profileform">
              
                               
                            <div class="form-group">
                                <label for="customer_name">Назва  </label>
                                <input   class="form-control" zippy="customer_name" required="required">
                            </div>
                          
                            <div class="form-group">
                                <label for="email">E-mail</label>
                                <input type="email" class="form-control" zippy="email">
                            </div>
                         
                            <div class="form-group  ">
                                <button type="submit" zippy="submitpass" class="btn btn-primary">Зберегти</button>
                            </div>

                              
                </form>
            </div>
   <div class="col-10  col-md-4 col-xl-3">

                <h4>Зміна пароля</h4>
                <form role="form" zippy="passwordform">

                    <div class="form-group">
                        <label for="userpassword">Пароль</label>
                        <input type="password" class="form-control" zippy="userpassword" required="required">
                    </div>

                    <div class="form-group">
                        <label for="userpassword">Підтвердження</label>
                        <input type="password" class="form-control " zippy="confirmpassword" required="required">
                    </div>

                    <button type="submit" zippy="submitpass" class="btn btn-primary">Зберегти</button>
                </form>
                <br>


            </div>

        </div>


    </body>

</html>
