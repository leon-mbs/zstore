<html>
  <head>
     <title>Замовлення партнерiв  </title>
 
</head>
<body>

        <div class="row  ">
            <div class="col-12    col-md-10    col-xl-8  ">
                <h4>Замовлення  партнерiв  </h4>
              <div class="navbar">
                    <form zippy="filter"  >
                     <div class="row  ">

                        <label class="col-form-label col-auto" for="searchnumber"> № </label>
                          <div class="col-auto  ">
                        <input class="form-control me-2" type="text" zippy="searchnumber" style="width:100px">
                      </div>
                        <label class="col-form-label col-auto"   for="from">З </label>
                         <div class="col-auto  ">
                         <input type="text" class="form-control   me-2  " zippy="from" style="width:110px">
                      </div>
                        <label  class="col-form-label col-auto"  for="to">по </label>
                         <div class="col-auto  ">
                         <input type="text" class="form-control   me-2  " zippy="to" style="width:110px">
                        </div>
                   
                        <label class="col-form-label col-auto" for="status">Статус</label>
                          <div class="col-auto  ">
                        <select class="form-control me-2" zippy="status">
                        </select>
                         </div>
                        <label  class="col-form-label col-auto"for="fpartner">Партнер</label>
                        
                         <div class="col-auto  ">
                         <select class="form-control me-2" zippy="fpartner">
                            <option value="0">Не обрано</option>
                        </select>
                          </div>
                          <div class="col-auto  ">
                        <input type="submit" class="  btn btn-success  " value="ОК">
                        </div></div>

                    </form>
                </div>
             <table class="table   table-sm      ">
                  <thead> 
                   <tr>
                      <th  >Номер</th>
                        <th  >Дата</th>
                        <th  >Партнер</th>
                        <th  >Статус</th>
                        <th  class="text-end">Сума</th>
             
                  </tr> 
                     </thead>
                    <tbody>
                        <tr zippy="doclist">
                            <td  > <a zippy="number"></a></td>
                            <td    zippy="date"> </td>
                            <td    zippy="customer"></td>
                            <td class="text-nowrap" zippy="state"></td>
                    
                            <td  class="text-end" zippy="amount"></td>
                         
                        </tr>
                 </tbody>
                </table>  
                  <div class="col-12" zippy="docpan">
                  <form zippy="sform"    >
                      <div class="row  ">
                         <label class="col-form-label col-auto" data-label="emps" for="mstates"> Виконавець </label>
                         <div class="col-auto  ">
                         <select zippy="emps" class="form-control me-2">
                         <option value="0">Не обрано</option>
                         </select>
                         </div> 
                         <div class="col-auto  ">
                         <button zippy="bsaves" class="btn btn-success  me-2"> В обробку</button>
                      </div>  
                           
                   </form>
               
                   
                     <div zippy="docview"></div>
                </div>                                              
            </div>
        </div>
   

    </body>
</html>
