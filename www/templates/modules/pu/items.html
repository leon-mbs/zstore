<html>
   
    <body>
        <div class="row">

            {{#hideblock}}
            <div class="col-12 col-xl-10">

              <h3>Експорт   товарів в  магазин</h3>
                &nbsp;&nbsp;&nbsp;<small><i class="fa fa-exclamation-triangle text-danger"></i>Спецсимволи (типу <b> &amp; ' " `</b>)
                    в назвi або описi може викликати проблеми з вигрузкою</small>
               <div class="navbar">
                    <form zippy="filter"  >
                      <div class="row  ">
                        <label class="col-form-label col-auto" for="searchcat">Категорія</label>
                         <div class="col-auto  ">
                        <select class="form-control mr-sm-2" zippy="searchcat">
                            <option value="0">Не задано</option>
                        </select>
                          </div>
                          <div class="col-auto  ">
                        <input onclick="document.getElementById('dialogwait').showModal()" type="submit" class=" me-2 btn btn-outline-success  "
                               value="Завантажити">
                        </div>
                      </div>
                    </form>
                </div>

                <form zippy="exportform">

                    <table class="table   table-sm   ">
                        <tr>

                            <th style="width:30px"><input type="checkbox" id="chall" onchange="chclick()"></th>

                            <th>Найменування</th>
                            <th>Артикул</th>
                            <th class="text-end">Кіл.</th>
                            <th class="text-end">Ціна</th>
                            <th> Опис</th>


                        </tr>
                        <tr zippy="newitemlist">

                            <td><input type="checkbox" zippy="ch" class="chc"></td>
                            <td zippy="name"></td>
                            <td zippy="code"></td>
                            <td zippy="qty" class="text-end"></td>
                            <td zippy="price" class="text-end"></td>
                            <td zippy="desc"></td>

                        </tr>

                    </table>
                    <div zippy="pag"></div>
                    <div class="ms-2 form-group row  ">
                    

                        &nbsp;<input onclick="document.getElementById('dialogwait').showModal()" type="submit"
                                     class="  btn btn-outline-success btn-sm  " value="Відправити">

                    </div>
                </form>
            </div>
            
            {{/hideblock}}
            <div class="col-12 col-md-8  ">

                <h3>Оновлення цін та кількості</h3>

                <div class="navbar">
                  <form zippy="upd"  >
                    <div class="row  ">
                      <label class="col-form-label col-auto" for="updcat">Категорiя</label>
                     <div class="col-auto  ">
                        <select class="form-control mr-sm-2" zippy="updcat">
                            <option value="0">Всi</option>
                        </select>
                       </div>
                   <div class="col-auto  ">
                    <a zippy="updateqty" class="  btn btn-outline-success  ">Оновити кількість</a>
                     </div>
                    <div class="col-auto  ">
                    <a zippy="updateprice" class="  btn btn-outline-success  ">Оновити ціни</a>
                      </div></div>
                    </form>

                </div>
            </div>

            <div class="col-12 col-md-8  ">

                <h3>Iмпорт товарів з магазину </h3>

                <div class="navbar">
                     <form zippy="importform"  >
                       <div class="row  ">
                          <div class="col-auto  ">
                         <div class="form-check">

                            <input   class="form-check-input" type="checkbox" zippy="createcat">
                            <label class="form-check-label mr-1" for="createcat">Створювати  категорiю як в  магазинi</label>
                        </div> 
                         </div> 
                        <div class="col-auto  ">
                        <input onclick="document.getElementById('dialogwait').showModal()" zippy="getitems" type="submit" class=" me-2 ms-2 btn btn-outline-success  "
                               value="Завантажити">
                         </div>  </div> 

                    </form>
                    
                </div>
            </div>
        </div>
        <script>

            function check_updateqty() {

                document.getElementById('dialogwait').showModal()
            }

            function check_updateprice() {

                document.getElementById('dialogwait').showModal()
            }

          

            function chclick() {
                var ch = $("#chall").prop('checked');
                $('.chc').prop('checked', ch)
            }
        </script>
    </body>
</html>
