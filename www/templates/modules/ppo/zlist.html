<html>
    <head>
      <title>Журнал  Z-звiтiв   </title>

    </head>
    <body>
        <div class="row">
            <div class="col-12  col-xl-10  ">
                <h3>Журнал  Z-звiтiв</h3>
                <div class="card">
                    <form zippy="filter"  >
                        <div class="row  ">
                        <label class="col-form-label col-auto" for="from">З</label>
                         <div class="col-auto  ">
                         <input class="form-control ms-sm-2" style="width: 110px" type="text" zippy="from">
                         </div>
                        <label class="col-form-label col-auto" for="to">по</label>
                         <div class="col-auto  ">
                         <input class="form-control ms-sm-2" style="width: 110px" type="text" zippy="to">
                         </div>
                        <label class="col-form-label col-auto" for="pos">ФН термiналу</label>
                         <div class="col-auto  ">

                         </div>
                        <label class="col-form-label col-auto" for="doc">ФН звiту</label>
                         <div class="col-auto  ">
                         <input class="form-control ms-sm-2"   type="text" zippy="doc">
                           </div>
                          <div class="col-auto  ">
                        <input class="btn btn-outline-primary  " type="submit" value="ОК">
                        </div></div>

                    </form>
                </div>
           </div>
           <div class="col-12  col-lg-8  col-xl-6">
                 
                <a  zippy="csv">Експорт  </a>
                <table class="table  table-sm">
                
                  <tr> 
                    <th>Дата</th>
                    <th>ФН. термiналу</th>
                    <th>ФН. звiту</th>
                    <th colspan="2" class="text-center">Реалiзацiя</th>
                    <th colspan="2" class="text-center">Повернення</th>
                    <th ></th>
                  </tr>
                  <tr> 
                    <th> </th>
                    <th> </th>
                    <th> </th>
                    <th  class="text-end">Чекiв</th>
                    <th  class="text-end">Сума</th>
                    <th  class="text-end">Чекiв</th>
                    <th  class="text-end">Сума</th>
                    <th > </th>
                  </tr>
                  
                  <tr zippy="list">  
                     <td zippy="createdon"></td>
                     <td zippy="fnpos"></td>
                     <td zippy="fndoc"></td>
                     <td zippy="cnt" class="text-end"></td>
                     <td zippy="amount" class="text-end"></td>
                     <td zippy="rcnt" class="text-end"></td>
                     <td zippy="ramount" class="text-end"></td>
                     <td> <a zippy="view"> <i class="fa fa-eye"></i> </a> </td>
                  </tr>
                  <tr  >  
                    <th> </th>
                    <th> </th>
                    <th class="text-end">Всього: </th>
                    <th zippy="tcnt" class="text-end"> </th>
                    <th zippy="tamount" class="text-end"> </th>
                    <th zippy="trcnt" class="text-end"> </th>
                    <th zippy="tramount" class="text-end"> </th>
                    <th > </th>
                  </tr>
                
                </table>
            
            </div>
         </div>
        <div zippy="detail" class="col-12  col-lg-8  col-xl-6">
         <ul class="nav nav-tabs">
  
          <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#tprint">  Друкована форма</a>
          </li>
          <li class="nav-item">
            <a class="nav-link  " data-bs-toggle="tab" href="#txml">  Вiдправлений XML</a>
          </li>
          <li class="nav-item">
            <a class="nav-link  " data-bs-toggle="tab" href="#tanswer">  Вiдповiдь  фiскального сервера</a>
          </li>
          
          </ul>
         <div class="tab-content"  >
          
                <div class="tab-pane   show active" id="tprint"> 
                   {{^usemobileprinter}}
                   <a href="javascript:void(0)"   onclick="printform()">Друк</a>
                   {{/usemobileprinter}}
                   {{#usemobileprinter}}
                   <a href="/showreport/print/zreport" target="_blank">Друк</a>
                   {{/usemobileprinter}}
                   <div zippy="preview" >
                  </div>
                </div>
                <div class="tab-pane   show  " id="txml"> 
                  <div zippy="vxml" >
                  </div>
                 
                </div>
                <div class="tab-pane   show  " id="tanswer">

                 <a zippy="download" >Завантажити</a>
                </div>
                
                
        </div>
    
      </div>
      
      <script>
      
     function printform() {
        
                $('#preview').printThis();
            }      
      
      </script>
    </body>
</html>
