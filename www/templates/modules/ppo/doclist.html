<html>
    <head>
      <title>Фiскалiзованi чеки   </title>

    </head>
    <body>
        <div class="row">
            <div class="col-12  col-xl-10  ">
                <h3>Фiскалiзованi чеки</h3>
                <div class="navbar">
                    <form zippy="filter"  >
                        <div class="row  ">
                        <label class="col-form-label col-auto" for="from">З</label>
                         <div class="col-auto  ">
                         <input class="form-control ms-sm-2" style="width: 110px" type="text" zippy="from">
                         </div>
                        <label class="col-form-label col-auto" for="to">по</label>
                         <div class="col-auto  ">
                         <input class="form-control ms-sm-2" style="width: 110px" type="text" zippy="to">
                          </div>
                        <label class="col-form-label col-auto" for="doc">Номер  </label>
                         <div class="col-auto  ">
                         <input  class="form-control ms-sm-2"   type="text" zippy="doc">
                          </div>
                         <div class="col-auto  ">
                         <input class="btn btn-primary  " type="submit" value="ОК">
                          </div>
                       </div>

                    </form>
                </div>
           </div>
      
               <div zippy="detail">
                    <div>
                        <a style="cursor:pointer" onclick=" $('#preview').printThis();" title="Друк"><i class="fa fa-print me-2"></i></a>
                        <a href="/showreport/xls/prrodoclist" target="_blank" title="Експорт у Excel"><i class="fa fa-file-excel me-2"></i></a>
                        <a href="/showreport/pdf/prrodoclist" target="_blank" title="Експорт у PDF"><i class="fa fa-file-pdf me-2"></i> </a>
                    </div>
                    <div zippy="preview" class="table-responsive-sm">
                    </div>

               </div>      
      
         </div>
 
    </body>
</html>
