<html>
   <head>
        <title> Звіт по кафе   </title>

    </head>
    <body>
        <div class="row">
            <div class="col-12  col-xl-10">
                <h2>Звіт по кафе</h2>
                <div class="navbar">
                    <form zippy="filter" >
                       <div class="row">
                        <label class="col-form-label col-auto" for="from">З</label>
                          <div class="col-auto  ">
                          <input class="form-control mr-sm-2" style="width: 120px" type="text" zippy="from">
                        </div>
                        <label class="col-form-label col-auto" for="to">по</label>
                          <div class="col-auto  ">
                            <input class="form-control mr-sm-2" style="width: 120px" type="text" zippy="to">
                        </div>

                        <label class="col-form-label col-auto" for="rtype">Тип</label>
                          <div class="col-auto  ">
                          <select class="form-control mr-sm-2" zippy="rtype">
                            <option value="0">По замовленнях</option>
                            <option value="1">По позиціях</option>
                        </select>
                        </div>
                        {{#diffbp}}
                        <label class="col-form-label col-auto" for="btype">Замовлення</label>
                          <div class="col-auto  ">
                          <select class="form-control mr-sm-2" zippy="btype">
                            <option value="0">Всі</option>
                            <option value="1">Кухня</option>
                            <option value="2">Бар</option>
                        </select>
                        </div>
                          {{/diffbp}}
                        
                          <div class="col-auto  ">
                           <input class="btn btn-primary  " type="submit" value="ОК">
                        </div>
                       </div>
                    </form>
                </div>


                <div zippy="detail">
                    <div>
                       <a style="cursor:pointer" onclick=" $('#preview').printThis();" title="Друк"><i class="fa fa-print me-2"></i></a>
                        <a href="/index.php?p=App/Pages/ShowReport&arg=xls/outfood" target="_blank" title="Експорт в Excel"><i class="fa fa-file-excel me-2"></i></a>
                        <a href="/index.php?p=App/Pages/ShowReport&arg=pdf/outfood" target="_blank" title="Експорт в PDF"><i class="fa fa-file-pdf me-2"></i> </a>
                    </div>
                    
                    <div  class="preview mt-2" zippy="preview"  >                    </div>

                </div>
            </div>
        </div>
    </body>
</html>
