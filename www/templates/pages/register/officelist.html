<html>
     <head>
        <title>  Офiснi документи </title>

    </head>
  <body>
        <div class="row">
            <div class="col-12 col-xl-10">

                <h3>Офiснi документи </h3>

                <div class="navbar nav">
                    <form zippy="filter" class="form-inline ">

                        <label for="searchnumber"> № </label>
                        <input placeholder="Номер..." class="form-control mr-2" type="search" zippy="searchnumber" style="width:100px">
                        
                        <label for="from"> З </label>
                        <input type="text" class="form-control    " zippy="from" style="width:110px">
                        <label for="to"> По </label>
                        <input type="text" class="form-control    " zippy="to" style="width:110px">
                                               
                        <label for="searchtype"> Тип </label>                          
                        <input type="text" class="form-control" zippy="searchtype">
                        

                        <div class="form-check">
                            <input   class="form-check-input" type="checkbox" zippy="archive">
                            <label class="form-check-label mr-2" for="archive">Архiвнi</label>
                        </div>                         
                         
                        <input placeholder="Пошук по контексту..." class="form-control mr-2" type="search" zippy="searchcontext" >

                        <input type="submit" class="  btn btn-outline-success  " value="ОК">
                       <a zippy="erase" title="Скинути фільтр"><i class="fa fa-eraser"></i></a>
                     
                    </form>
                </div>
                       <details class="mb-2 ml-2">
                        <summary >Теги</summary>
                        <span zippy="taglist"></span>
                     </details>
                <a href="/index.php?p=App/Pages/Doc/OfficeDoc" class="btn btn-info btn-sm">Створити новий</a>
     
               
                <table class="table   table-sm   ">
                    <tr>
                        <th>Назва</th>

                        <th>Номер</th>
                        <th>Дата</th>

                        <th>Статус</th>


                        <th>Примiтка</th>
                        <th></th>


                    </tr>
                    <tr zippy="doclist">
                        <td >
                          <a zippy="title" ></a>
                        </td>

                        <td zippy="number"></td>
                        <td class="text-nowrap" zippy="date"></td>
                  

                        <td class="text-nowrap" zippy="state"></td>
                        <td zippy="notes"></td>

                        <td >

                            <a zippy="copy" title="Копiя"><i class="fa fa-copy"></i></a>
                            &nbsp; &nbsp;
                            <a zippy="edit" title="Редагування"><i class="fa fa-edit"></i></a>

                        </td>


                    </tr>

                </table>

                <div zippy="pag">
                </div>
                <a id="dankor"></a>
            </div>

        </div>


        <div class="row" zippy="statuspan">
            <div class="col-12">

                  <div class="navbar nav">
                    <form zippy="statusform" class="form-inline ">
                         <label data-label="mstates" for="mstates"> Статус </label>
            
                         <button zippy="bcopy" class="btn btn-info  ml-2"><i class="fas fa-copy"></i> Копія</button>                         
                    </form>
                 </div>

                <div zippy="docview"></div>

            </div>
        </div>


    </body>
</html>
