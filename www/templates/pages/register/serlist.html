<html>
   <head>
        <title>  Журнал послуг </title>

    </head>
    <body>
        <div zippy="listpan" class="row">
            <div class="col-12 col-xl-10">

                <h3>Журнал послуг  </h3>


                <div class="navbar">
                    <form zippy="filter"  >
                     <div class="row  ">

                        <label class="col-form-label col-auto" for="searchnumber"> № </label>
                         <div class="col-auto  ">
                        <input class="form-control me-2" type="text" zippy="searchnumber" style="width:100px">
                        </div>
                         <div class="col-auto  ">
                        <select class="form-control me-2" zippy="status">
                        </select>
                        </div>
                        <div class="col-auto  ">
                        <input class="form-control me-2" type="text" zippy="searchtext" placeholder="Пошук по контенту" ]>
                        </div>
                         <div class="col-auto  ">
                        <input type="submit" class="  btn btn-success  " value="ОК">
                        </div>
                      </div>
                    </form>
                </div>

                <a href="/index.php?p=App/Pages/Doc/ServiceAct" class="btn btn-info mt-2 mb-3">Створити новий</a>
                <br> <a zippy="csv">Експорт у Excel</a>

                <table class="table   table-sm   ">
                    <tr>

                        <th>Номер</th>
                        <th>Дата</th>
                        <th>Клієнт</th>
                        <th> </th>
                        <th class="text-end">Сума</th>

                        <th>Статус</th>

                            <th></th>
                        <th>Примітка</th>
                   
                        <th></th>


                    </tr>
                    <tr zippy="doclist">

                        <td  ><a zippy="number"></a></td>
                        <td class="text-nowrap" zippy="date"></td>
                        <td zippy="customer"></td>
                        <td zippy="customerphone"></td>
                        <td zippy="amount" class="text-end"></td>


                        <td class="text-nowrap" zippy="state"></td>
                        <td>
                            <i  zippy="ispay"   class="fa fa-credit-card "></i>
                        </td>
                                        
                        <td zippy="onotes"></td>

                        <td class="text-nowrap">
                            <a zippy="show" title="Перегляд"><i class="fa fa-eye"></i></a>

                            &nbsp; &nbsp; &nbsp; &nbsp; <a zippy="edit" title="Редагування"><i class="fa fa-edit"></i></a>

                        </td>


                    </tr>

                </table>

                <div zippy="pag">
                </div>
                <a id="dankor"></a>
            </div>

        </div>


        <div class="row" zippy="statuspan">
            <div class="col-12">

                <div class="navbar">
                    <form zippy="statusform"  >
                      <div class="row  ">
                        <div class="col-auto  ">
                         <button zippy="binproc" type="submit" class="  btn btn-success  me-2 ">На виконання</button>
                         </div>
                        <div class="col-auto  ">
                         <button zippy="bfin" type="submit" class="  btn btn-success  me-2 ">Виконано</button>
                         </div>
                        <div class="col-auto  ">
                         <a zippy="btopay" class="  btn btn-success  me-2 ">Оплатити</a>
                         </div>
                        <div class="col-auto  ">
                         <button zippy="bpos" class="btn btn-info  me-2">   {{^fiscal}} Чек   {{/fiscal}}     {{#fiscal}}  Фіскальний чек    {{/fiscal}}    </button>
                         </div>
                         <div class="col-auto  ">
                           <button zippy="binvoice" type="submit" class="  btn btn-info me-2 "  >Рахунок  </button>
                        </div> 
                         <div class="col-auto  ">
                         <button zippy="bwarranty" type="submit" class="  btn btn-info me-2 "  >Гар. талон  </button>
                         </div>
                          {{#useprod}}
                         <div class="col-auto  ">
                         <button zippy="btask" type="submit" class=" btn btn-info me-2 ">Наряд</button>
                         </div>
                         {{/useprod}}
                       
                        <div class="col-auto  "> 
                          <button zippy="bref" type="submit" class="  btn btn-danger me-2 ">Анулювано</button>
                       </div>
                       </div>
                    </form>
                </div>


                <div zippy="docview"></div>

            </div>
        </div>

       <div zippy="editpan" class="row"  >
          <div  class="col-12 col-md-10 col-xl-8"  >
               <table class="table  table-sm">
                    <tr>
                        <th>Назва</th>
                 
                        <th> </th>
                        <th class="text-end">Кiл.</th>

                        <th class="text-end"><i class="fa fa-gift"></i>,%</th>
                        <th class="text-end">Ціна</th>
                        <th class="text-end">Сума</th>

                        <th  ></th>
                           
                    </tr>
                    <tr><td colspan="8">
                         <form zippy="sform"   >
                              <div class="row  ">
                             <label class="col-form-label col-auto" for="sser"> Робота </label>  
                              
                                <div class="col-auto  ">  
                               <select zippy="sser" class="form-control select2">
                                  <option value="0">Не вибрана</option>                                  
                               </select>  </div>
                              
                               <label class="col-form-label col-auto" for="sdesc"> Коментар </label>  
                                <div class="col-auto  ">
                               <input  type="text"  class="form-control" zippy="sdesc"  >
                                 </div>
                                <label class="col-form-label col-auto" for="sqty"> Кiл. </label>  
                                <div class="col-auto  ">
                               <input  required="on"  style="width:100px"  type="text"  class="form-control priceqty" zippy="sqty"  >
                              </div>
                                <label class="col-form-label col-auto" for="sprice"> Цiна </label>  
                                <div class="col-auto  ">
                               <input  required="on"  style="width:100px"  type="text"  class="form-control priceqty" zippy="sprice"  >
                               </div>
                               <div class="col-auto  ">
                              <input  zippy="ssubmit" type="submit"  value="+" class="btn btn-success"   >
                              </div></div>
                         </form>
                    </td></tr> 
                     <tr zippy="slist"   >
                                <td zippy="rsservice_name"></td>
                              
                                <td zippy="rsdesc"></td>
                                <td zippy="rsquantity" class="text-end"> </td>
                                <td zippy="rsdisc"  class="text-end"></td>
                                <td zippy="rsprice"  class="text-end"></td>
                                <td zippy="rsamount"  class="text-end"></td>


                                <td> <a  zippy="rsdel" ><i class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                        <tr><td colspan="8">
                          <form zippy="iform"   >
                            <div class="row  ">
                                 <label for="iitem"> ТМЦ </label>
                               <div class="col-auto  ">
                               <input zippy="iitem"  class="form-control">
                               </div>
                              {{#usesnumberitem}}
                               
                                 <label for="isn"> с/н </label>
                                  <div class="col-auto  ">
                               <input zippy="isn"  class="form-control">
                               </div>
                               {{/usesnumberitem}}
                              
                                 <label for="iqty"> Кiл. </label>
                                <div class="col-auto  ">
                                <input  required="on"  style="width:100px"  type="text"  class="form-control priceqty" zippy="iqty"  >
                                </div>
                                <label for="iprice"> Цiна </label>
                               <div class="col-auto  ">
                                <input  required="on"  style="width:100px"  type="text"  class="form-control priceqty" zippy="iprice"  >
                                </div>
                           
                              <div class="col-auto  ">
                               <input  zippy="isubmit" type="submit"  value="+" class="btn btn-success"   >
                               </div>
                              </div> 
                            </form>                    
                        </td></tr>           
                             <tr zippy="ilist" >
                                <td zippy="riname"  ></td>
                                <td zippy="ricode"   ></td>
                            

                                <td zippy="riquantity"  class="text-end"></td>

                                <td  zippy="ridisc" class="text-end"></td>
                                <td  zippy="riprice" class="text-end"></td>
                                <td  zippy="riamount" class="text-end"></td>


                                <td> <a  zippy="ridel"><i class="fa fa-trash"></i></a>
                                </td>
                            </tr>                 
                             <tr style="font-weight: bolder;">
                                <td colspan="5" class="text-end">На суму:</td>
                                <td zippy="etotal"  class="text-end"></td>
                                <td></td>
                            </tr>                                 
                      <tr><td colspan="7">
                          <a zippy="closeedit"  class="btn btn-outline-info me-2">Скасувати</a>
                          <a zippy="saveedit" class="btn btn-success ">Зберегти</a>
                    </td></tr>           
                                           
                    
                    
               </table>
         </div>
       </div>

    </body>
</html>
